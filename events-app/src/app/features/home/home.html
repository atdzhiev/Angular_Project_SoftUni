<div class="slider-area hero-overly">
    <div class="single-slider hero-overly slider-height d-flex align-items-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-xl-8 col-lg-9">

                    <div class="hero__caption">
                        <span>Explore the city</span>
                        <h1>Discover Great Places</h1>
                    </div>

                    <form class="search-box" #searchForm="ngForm" (ngSubmit)="search(searchForm)">

                        <div class="input-form">
                            <input type="text" placeholder="What are you looking for?" name="searchText" ngModel>
                        </div>

                        <div class="select-form">
                            <div class="select-itms">
                                <select name="town" ngModel>
                                    <option value="">All Towns</option>
                                    <option value="Sofia">Sofia</option>
                                    <option value="Plovdiv">Plovdiv</option>
                                    <option value="Varna">Varna</option>
                                    <option value="Burgas">Burgas</option>
                                </select>
                            </div>
                        </div>

                        <div class="search-form">
                            <button type="submit">Search</button>
                        </div>

                    </form>


                </div>
            </div>
        </div>
    </div>
</div>

<div class="popular-location section-padding30">
    <div class="container">

        <div class="row">
            <div class="col-lg-12">
                <div class="section-tittle text-center mb-80">
                    <h2>Latest Events</h2>
                </div>
            </div>
        </div>

        <div class="row">

            @for (event of lastThreeEvents; track event._id) {
            <div class="col-lg-4 col-md-6 col-sm-6">
                <div class="single-location mb-30">

                    <div class="location-img"
                        [style.background-image]="event.images.length > 0 ? 'url(' + event.images[0] + ')' : ''"
                        style="background-size: cover; background-position: center; height: 250px;">
                    </div>

                    <div class="location-details">
                        <p>{{ event.title }}</p>

                        @if (event._id) {
                        <a [routerLink]="['/events', event._id]" class="location-btn">
                            View Event
                        </a>
                        }
                    </div>

                </div>
            </div>
            }

        </div>

        <div class="row mt-4">
            <div class="col-lg-12 text-center">
                <a [routerLink]="['/events']" class="view-all-events-btn">
                    View All Events
                </a>
            </div>
        </div>

    </div>
</div>
