<section class="login-page">
  <div class="login-overlay"></div>

  <div class="login-container">
    <div class="login-box">

      <h2 class="login-title">Welcome Back</h2>
      <p class="login-subtitle">Sign in to continue</p>

      <form>

        <div class="form-group">
          <input type="email" placeholder="Email Address" [value]="email()"
            (input)="email.set($event.target.value); onInputChange()" />
        </div>

        <div class="form-group">
          <input type="password" placeholder="Password" [value]="password()"
            (input)="password.set($event.target.value); onInputChange()" />
        </div>

        <button type="submit" class="btn-login" (click)="submit()" [disabled]="loading()">{{ loading() ? 'Logging in...'
          : 'Login' }}</button>

        <p @if(error()) class="error-msg">{{ error() }}</p>

        <div class="login-footer-center">
          <span>Don’t have an account?</span>
          <a routerLink="/register">Register here</a>
        </div>

      </form>

    </div>
  </div>
</section>
