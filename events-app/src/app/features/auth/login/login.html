<section class="login-page">
  <div class="login-overlay"></div>

  <div class="login-container">
    <div class="login-box">

      <h2 class="login-title">Welcome Back</h2>
      <p class="login-subtitle">Sign in to continue</p>

      <form #loginForm="ngForm" (ngSubmit)="submit(loginForm)">

        
        <div class="form-group">
          <input type="email"
                 name="email"
                 placeholder="Email Address"
                 required
                 email
                 [ngModel]="email()"
                 (ngModelChange)="email.set($event); onInputChange()"
                 #emailField="ngModel" />

          @if (emailField.invalid && emailField.touched) {
            <p class="error-msg">Please enter a valid email</p>
          }
        </div>

       
        <div class="form-group">
          <input type="password"
                 name="password"
                 placeholder="Password"
                 required
                 minlength="6"
                 [ngModel]="password()"
                 (ngModelChange)="password.set($event); onInputChange()"
                 #passwordField="ngModel" />

          @if (passwordField.invalid && passwordField.touched) {
            <p class="error-msg">Password is required</p>
          }
        </div>

       
        <button type="submit"
                class="btn-login"
                [disabled]="loading() || loginForm.invalid">

          {{ loading() ? 'Logging in...' : 'Login' }}
        </button>

        <div class="login-footer-center">
          <span>Don’t have an account?</span>
          <a routerLink="/register">Register here</a>
        </div>

      </form>

    </div>
  </div>
</section>
