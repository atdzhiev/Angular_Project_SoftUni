<section class="register-page">
  <div class="register-overlay"></div>

  <div class="register-container">
    <div class="register-box">

      <h2 class="register-title">Create Account</h2>
      <p class="register-subtitle">Join us and get started</p>

      <form>

        <div class="form-group">
          <input type="text" placeholder="Username" [value]="username()"
            (input)="username.set($event.target.value); onInputChange()" />
        </div>

        <div class="form-group">
          <input type="email" placeholder="Email Address" [value]="email()"
            (input)="email.set($event.target.value); onInputChange()" />
        </div>

        <div class="form-group">
          <input type="password" placeholder="Password" [value]="password()"
            (input)="password.set($event.target.value); onInputChange()" />
        </div>

        <div class="form-group">
          <input type="password" placeholder="Confirm Password" [value]="repass()"
            (input)="repass.set($event.target.value); onInputChange()" />
        </div>

        <button type="button" class="btn-register" (click)="submit()" [disabled]="loading()">
          {{ loading() ? 'Creating account...' : 'Register' }}
        </button>

        @if (localError()) {
        <p class="error-msg">{{ localError() }}</p>
        }

        @if (error()) {
        <p class="error-msg">{{ error() }}</p>
        }

        <div class="register-footer-center">
          <span>Already have an account?</span>
          <a routerLink="/login">Login here</a>
        </div>

      </form>

    </div>
  </div>
</section>
